<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Postprocessor Workspace</title>
    <script>
      (() => {
        try {
          const key = "anime-ops-ui-theme";
          const stored = localStorage.getItem(key);
          const theme =
            stored ||
            (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="placeholder-shell">
        <section class="placeholder-panel">
          <div class="hero-links">
            <a class="hero-link" href="/">Dashboard</a>
            <span class="hero-link-sep">/</span>
            <span class="hero-link-current">Postprocessor</span>
          </div>
          <div class="placeholder-toolbar">
            <div class="eyebrow">Postprocessor</div>
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗主题">
              <span class="theme-toggle-copy">
                <span class="theme-toggle-title">Theme</span>
                <span class="theme-toggle-state" data-theme-label>Light</span>
              </span>
              <span class="theme-toggle-track" aria-hidden="true">
                <span class="theme-toggle-icon">☀</span>
                <span class="theme-toggle-icon">☾</span>
                <span class="theme-toggle-thumb"></span>
              </span>
            </button>
          </div>
          <h1>后处理工作区占位</h1>
          <p>
            这一页后面会接入最近处理记录、等待窗口中的候选、手动补扫和受控重跑入口。
            当前先把它固定成 `ops-ui` 的内部页，而不是外部服务跳转。
          </p>
          <div class="placeholder-actions">
            <a class="service-link" href="/">Back to Dashboard</a>
            <a class="ghost-link" href="/logs">Open Logs</a>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/theme.js" defer></script>
  </body>
</html>
