<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RPI Anime Ops</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Raspberry Pi Operations</div>
          <h1 id="page-title">RPI Anime Ops</h1>
          <p id="page-subtitle">
            树莓派私人影音库控制台
          </p>
        </div>
        <div class="hero-meta">
          <div class="meta-pill">
            <span class="meta-label">Host</span>
            <span id="host-name">-</span>
          </div>
          <div class="meta-pill">
            <span class="meta-label">Updated</span>
            <span id="last-updated">-</span>
          </div>
        </div>
      </header>

      <main class="content-grid">
        <section class="panel panel-wide">
          <div class="panel-head">
            <h2>服务入口</h2>
            <p>一个页面统一进入媒体、下载和网络链路。</p>
          </div>
          <div id="services-grid" class="services-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>主机状态</h2>
            <p>来自树莓派本地监控。</p>
          </div>
          <div id="system-cards" class="metric-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>下载链路</h2>
            <p>来自 qBittorrent 与媒体目录。</p>
          </div>
          <div id="queue-cards" class="metric-grid"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-head">
            <h2>网络与访问</h2>
            <p>只使用本地 `Tailscale` 状态，不走云 API。</p>
          </div>
          <div id="network-cards" class="metric-grid metric-grid-wide"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-head">
            <h2>诊断</h2>
            <p>前端和数据源异常会集中出现在这里。</p>
          </div>
          <div id="diagnostics" class="diagnostics"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
