services:
  homepage:
    build:
      context: ..
      dockerfile: services/ops_ui/Dockerfile
    container_name: homepage
    user: "0:0"
    ports:
      - "${HOMEPAGE_PORT}:3000/tcp"
    environment:
      TZ: "${TZ}"
      ANIME_DATA_ROOT: "${ANIME_DATA_ROOT}"
      HOMEPAGE_BASE_HOST: "${HOMEPAGE_BASE_HOST}"
      GLANCES_API_URL: "http://glances:61208/api/4"
      TAILSCALE_SOCKET: "/var/run/tailscale/tailscaled.sock"
      DOCKER_SOCKET: "/var/run/docker.sock"
      JELLYFIN_PORT: "${JELLYFIN_PORT}"
      QBITTORRENT_WEBUI_PORT: "${QBITTORRENT_WEBUI_PORT}"
      AUTOBANGUMI_PORT: "${AUTOBANGUMI_PORT}"
      GLANCES_PORT: "${GLANCES_PORT}"
      QBITTORRENT_API_URL: "${QBITTORRENT_API_URL}"
      QBITTORRENT_USERNAME: "${QBITTORRENT_USERNAME}"
      QBITTORRENT_PASSWORD: "${QBITTORRENT_PASSWORD}"
      POSTPROCESSOR_CATEGORY: "${POSTPROCESSOR_CATEGORY}"
      OPS_UI_REFRESH_INTERVAL_SECONDS: "${OPS_UI_REFRESH_INTERVAL_SECONDS:-8}"
      OPS_UI_SAMPLE_INTERVAL_SECONDS: "${OPS_UI_SAMPLE_INTERVAL_SECONDS:-60}"
      OPS_UI_SERIES_WINDOW_HOURS: "${OPS_UI_SERIES_WINDOW_HOURS:-24}"
      OPS_UI_UPLOAD_WINDOW_DAYS: "${OPS_UI_UPLOAD_WINDOW_DAYS:-7}"
      OPS_UI_STATE_ROOT: "/data"
    volumes:
      - "${ANIME_DATA_ROOT}:/srv/anime-data"
      - "${ANIME_APPDATA_ROOT}/ops-ui:/data"
      - "/var/run/tailscale:/var/run/tailscale:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "../services/ops_ui/src:/app/services/ops_ui/src:ro"
      - "../services/postprocessor/src:/app/services/postprocessor/src:ro"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    pid: host
    ports:
      - "${GLANCES_PORT}:61208/tcp"
    environment:
      TZ: "${TZ}"
      GLANCES_OPT: "-w"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  jellyfin:
    image: ghcr.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "${PUID}:${PGID}"
    ports:
      - "${JELLYFIN_PORT}:8096/tcp"
      - "7359:7359/udp"
    environment:
      TZ: "${TZ}"
      JELLYFIN_PublishedServerUrl: "${JELLYFIN_PUBLISHED_SERVER_URL}"
    volumes:
      - "${ANIME_APPDATA_ROOT}/jellyfin/config:/config"
      - "${ANIME_APPDATA_ROOT}/jellyfin/cache:/cache"
      - "${ANIME_DATA_ROOT}/library/seasonal:/media/seasonal"
      - "${ANIME_COLLECTION_ROOT}:/media/collection:ro"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    ports:
      - "${QBITTORRENT_WEBUI_PORT}:8080/tcp"
      - "${QBITTORRENT_TORRENT_PORT}:6881/tcp"
      - "${QBITTORRENT_TORRENT_PORT}:6881/udp"
    environment:
      TZ: "${TZ}"
      PUID: "${PUID}"
      PGID: "${PGID}"
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "${QBITTORRENT_TORRENT_PORT}"
    volumes:
      - "${ANIME_APPDATA_ROOT}/qbittorrent/config:/config"
      - "${ANIME_DATA_ROOT}/downloads:/downloads"
      - "${ANIME_DATA_ROOT}/library/seasonal:/library/seasonal"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  autobangumi:
    image: ghcr.io/estrellaxd/auto_bangumi:latest
    container_name: autobangumi
    ports:
      - "${AUTOBANGUMI_PORT}:7892/tcp"
    environment:
      TZ: "${TZ}"
      PUID: "${PUID}"
      PGID: "${PGID}"
      UMASK: "022"
    volumes:
      - "${ANIME_APPDATA_ROOT}/autobangumi/config:/app/config"
      - "${ANIME_APPDATA_ROOT}/autobangumi/data:/app/data"
      - "${ANIME_DATA_ROOT}/downloads:/downloads"
      - "${ANIME_DATA_ROOT}/library/seasonal:/library/seasonal"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    dns:
      - 8.8.8.8

  postprocessor:
    build:
      context: ../services/postprocessor
    container_name: anime-postprocessor
    user: "${PUID}:${PGID}"
    environment:
      TZ: "${TZ}"
      PYTHONUNBUFFERED: "1"
      ANIME_DATA_ROOT: "${ANIME_DATA_ROOT}"
      ANIME_COLLECTION_ROOT: "${ANIME_COLLECTION_ROOT}"
      QBITTORRENT_API_URL: "${QBITTORRENT_API_URL}"
      QBITTORRENT_USERNAME: "${QBITTORRENT_USERNAME}"
      QBITTORRENT_PASSWORD: "${QBITTORRENT_PASSWORD}"
      QBITTORRENT_DOWNLOAD_ROOT: "${QBITTORRENT_DOWNLOAD_ROOT}"
      POSTPROCESSOR_TITLE_MAP: "${POSTPROCESSOR_TITLE_MAP}"
      POSTPROCESSOR_POLL_INTERVAL: "${POSTPROCESSOR_POLL_INTERVAL}"
      POSTPROCESSOR_WAIT_TIMEOUT: "${POSTPROCESSOR_WAIT_TIMEOUT}"
      POSTPROCESSOR_CATEGORY: "${POSTPROCESSOR_CATEGORY}"
      POSTPROCESSOR_DELETE_LOSERS: "${POSTPROCESSOR_DELETE_LOSERS}"
    volumes:
      - "${ANIME_DATA_ROOT}:/srv/anime-data"
      - "${ANIME_COLLECTION_ROOT}:/srv/anime-collection"
    entrypoint: ["python", "-u", "-m", "anime_postprocessor.main"]
    command: ["watch"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
